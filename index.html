<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oblique Strategies</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --card-w: 480px;
      --card-h: 373px;
      --cream: #f5f0e8;
      --ink: #1a1410;
      --ink-light: #3d3228;
      --accent: #8b6914;
      --bg-dark: #0e0c09;
    }

    /* ── Page ── */
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: var(--bg-dark);
      font-family: 'EB Garamond', serif;
      overflow: hidden;
      position: relative;
      cursor: pointer;
    }

    #bg-layer {
      position: fixed;
      inset: 0;
      background-size: cover;
      background-position: center;
      z-index: 0;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 30% 40%, #1c1508 0%, transparent 70%),
        radial-gradient(ellipse 60% 80% at 75% 65%, #0a1a0f 0%, transparent 60%),
        radial-gradient(ellipse 100% 100% at 50% 50%, #150f06 0%, #060402 100%);
      z-index: 1;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 128px;
      opacity: 0.6;
      z-index: 2;
      pointer-events: none;
    }

    /* ── Scene ── */
    .scene {
      position: relative;
      z-index: 3;
      width: var(--card-w);
      height: var(--card-h);
      perspective: 1200px;
      animation: fadeIn 1.2s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Card — single face, flip done via JS class ── */
    .card {
      width: 100%;
      height: 100%;
      position: relative;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background-color: var(--cream);
      background-image:
        repeating-linear-gradient(
          0deg, transparent, transparent 28px,
          rgba(139,105,20,.03) 28px, rgba(139,105,20,.03) 29px
        ),
        repeating-linear-gradient(
          90deg, transparent, transparent 28px,
          rgba(139,105,20,.02) 28px, rgba(139,105,20,.02) 29px
        );
      box-shadow:
        0 2px 0 rgba(139,105,20,.15),
        0 4px 0 rgba(139,105,20,.08),
        0 25px 60px rgba(0,0,0,.7),
        0 8px 24px rgba(0,0,0,.5),
        inset 0 0 40px rgba(139,105,20,.06);
    }

    /* Worn edge ring */
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 10px;
      box-shadow: inset 0 0 0 1px rgba(139,105,20,.2);
      pointer-events: none;
      z-index: 2;
    }

    /* Card texture */
    .texture-layer {
      position: absolute;
      inset: 0;
      border-radius: 10px;
      background-size: cover;
      background-position: center;
      opacity: 0.10;
      mix-blend-mode: multiply;
      pointer-events: none;
      z-index: 1;
    }

    /* Flip animations — flip OUT then flip IN, swap content in between */
    @keyframes flipOut {
      from { transform: rotateY(0deg);  }
      to   { transform: rotateY(90deg); }
    }
    @keyframes flipIn {
      from { transform: rotateY(-90deg); }
      to   { transform: rotateY(0deg);   }
    }

    .card.flip-out {
      animation: flipOut 0.38s cubic-bezier(0.55, 0, 1, 0.45) forwards;
    }
    .card.flip-in {
      animation: flipIn 0.38s cubic-bezier(0, 0.55, 0.45, 1) forwards;
    }

    /* ── Corners ── */
    .corner {
      position: absolute;
      width: 18px;
      height: 18px;
      border-color: rgba(139,105,20,.25);
      border-style: solid;
      z-index: 3;
    }
    .corner--tl { top:14px;    left:14px;  border-width: 1px 0 0 1px; }
    .corner--tr { top:14px;    right:14px; border-width: 1px 1px 0 0; }
    .corner--bl { bottom:14px; left:14px;  border-width: 0 0 1px 1px; }
    .corner--br { bottom:14px; right:14px; border-width: 0 1px 1px 0; }

    /* ── Hint ── */
    .hint {
      position: relative;
      z-index: 3;
      margin-top: 32px;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,.18);
    }

    /* ── Content styles ── */
    .content {
      position: relative;
      z-index: 2;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .title-wrap {
      text-align: center;
      padding: 40px 50px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .title-main {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--ink);
      margin-bottom: 10px;
    }
    .title-sub {
      font-style: italic;
      font-size: 14px;
      color: var(--ink-light);
      margin-bottom: 28px;
    }
    .divider {
      width: 120px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--accent), transparent);
      margin-bottom: 28px;
    }
    .title-authors {
      font-size: 11.5px;
      letter-spacing: 0.18em;
      color: var(--ink);
      margin-bottom: 14px;
    }
    .title-edition { font-size: 12px; color: var(--ink-light); margin-bottom: 6px; }
    .title-copy    { font-size: 11px; color: var(--accent); opacity: .7; }

    .explainer-wrap {
      padding: 38px 48px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .explainer-text {
      font-size: 13px;
      line-height: 1.78;
      color: var(--ink-light);
      text-align: center;
    }

    .start-wrap {
      text-align: center;
      padding: 40px 50px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .start-title {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.14em;
      color: var(--ink);
    }
    .start-divider {
      width: 80px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--accent), transparent);
    }
    .start-cta {
      font-style: italic;
      font-size: 14px;
      color: var(--ink-light);
    }

    .strategy-text {
      font-size: 20px;
      line-height: 1.5;
      color: var(--ink);
      text-align: center;
      padding: 0 52px;
      max-width: 380px;
      animation: textReveal 0.4s 0.2s ease both;
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div id="bg-layer"></div>

  <div class="scene">
    <div class="card" id="card">
      <div class="corner corner--tl"></div>
      <div class="corner corner--tr"></div>
      <div class="corner corner--bl"></div>
      <div class="corner corner--br"></div>
      <div class="texture-layer" id="texLayer"></div>
      <div class="content" id="content"></div>
    </div>
  </div>

  <div class="hint" id="hint">click to begin</div>

  <script>

    // ── Image config — fill in your actual filenames ──────
    const BG_IMAGES = ['bg1.jpg', 'bg2.jpg', 'bg3.jpg'];
    const CT_IMAGES = ['ct1.jpg', 'ct2.jpg', 'ct3.jpg'];
    function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    document.getElementById('bg-layer').style.backgroundImage =
      `url("BG/${pickRandom(BG_IMAGES)}")`;
    document.getElementById('texLayer').style.backgroundImage =
      `url("CT/${pickRandom(CT_IMAGES)}")`;

    // ── DOM ───────────────────────────────────────────────
    const card    = document.getElementById('card');
    const content = document.getElementById('content');
    const hint    = document.getElementById('hint');

    // ── Card content templates ────────────────────────────
    const TITLE = `
      <div class="title-wrap">
        <div class="title-main">OBLIQUE STRATEGIES</div>
        <div class="title-sub">Over one hundred worthwhile dilemmas</div>
        <div class="divider"></div>
        <div class="title-authors">BRIAN ENO &amp; PETER SCHMIDT</div>
        <div class="title-edition">New edition, revised and compiled, 2023</div>
        <div class="title-copy">© 1975 Brian Eno and Peter Schmidt</div>
      </div>`;

    const EXPLAINER = `
      <div class="explainer-wrap">
        <p class="explainer-text">
          These cards evolved from separate observations of the principles underlying
          what we were doing. Sometimes they were recognized in retrospect (intellect
          catching up with intuition), sometimes they were identified as they were
          happening, sometimes they were formulated.<br><br>
          They can be used as a pack — a set of possibilities being continuously
          reviewed in the mind — or by drawing a single card from the shuffled pack
          when a dilemma occurs in a working situation. In this case the card is
          trusted even if its appropriateness is quite unclear.<br><br>
          They are not final, new ideas will present themselves, and other will
          become self-evident.
        </p>
      </div>`;

    const START = `
      <div class="start-wrap">
        <div class="start-title">OBLIQUE STRATEGIES</div>
        <div class="start-divider"></div>
        <div class="start-cta">click to draw a new card</div>
      </div>`;

    function strategyCard(text) {
      return `<p class="strategy-text">${text}</p>`;
    }

    // ── State machine ─────────────────────────────────────
    // 0 = showing Title     → click → show Explainer
    // 1 = showing Explainer → click → show Start
    // 2 = showing Start     → click → show Strategy
    // 3 = showing Strategy  → click → show Start   (loop 2 ↔ 3)
    let state  = 0;
    let locked = false;

    const HALF = 380; // ms — must match CSS animation duration

    // Show first card immediately (no flip on load)
    content.innerHTML = TITLE;

    // ── Flip helper ───────────────────────────────────────
    // Flips out, calls swapFn at midpoint, flips in
    function flip(swapFn, nextHint) {
      if (locked) return;
      locked = true;

      card.classList.add('flip-out');

      setTimeout(() => {
        card.classList.remove('flip-out');
        swapFn();                          // swap content while card is edge-on
        card.classList.add('flip-in');
        hint.textContent = nextHint;

        setTimeout(() => {
          card.classList.remove('flip-in');
          locked = false;
        }, HALF + 50);
      }, HALF);
    }

    // ── Click handler ─────────────────────────────────────
    document.addEventListener('click', () => {
      if (locked) return;

      if (state === 0) {
        // Title → Explainer
        flip(() => { content.innerHTML = EXPLAINER; }, 'click to continue');
        state = 1;

      } else if (state === 1) {
        // Explainer → Start
        flip(() => { content.innerHTML = START; }, 'click to draw');
        state = 2;

      } else if (state === 2) {
        // Start → random Strategy
        const pick = STRATEGIES[Math.floor(Math.random() * STRATEGIES.length)];
        flip(() => { content.innerHTML = strategyCard(pick); }, 'click to draw again');
        state = 3;

      } else {
        // Strategy → Start
        flip(() => { content.innerHTML = START; }, 'click to draw');
        state = 2;
      }
    });

    // ── Strategies ────────────────────────────────────────
    const STRATEGIES = [
    "Abandon normal instruments",
    "Accept advice",
    "Accretion",
    "Always first steps",
    "Allow an easement (an easement is the abandonment of a stricture)",
    "Are there sections? Consider transitions",
    "Ask people to work against their better judgement",
    "Ask your body",

    "Use something nearby as a model",
    "Be dirty",
    "What is the simplest solution?",
    "Be extravagant",
    "Be less critical more often",
    "Breathe more deeply",
    "Remove ambiguities and convert to specifics",
    "Change nothing and continue with immaculate consistency",
    "Remove specifics and convert to ambiguities",
    "Courage!",
    "Cut a vital connection",
    "Decorate, decorate",
    "Define an area as 'safe' and use it as an anchor",
    "Destroy -nothing -the most important thing",
    "Discard an axiom",
    "Disciplined self-indulgence",
    "Disconnect from desire",
    "Discover the recipes you are using and abandon them",
    "Distorting time",
    "Do nothing for as long as possible",
    "Don't be afraid of things because they're easy to do",
    "Don't be frightened of cliches",
    "Don't be frightened to display your talents",
    "A line has two sides",
    "From nothing to more than nothing",
    "Don't break the silence",
    "Don't stress one thing more than another",
    "Bridges -build -burn",
    "Do something boring",
    "Idiot glee (?)",
    "It is quite possible (after all)",
    "Lost in useless territory",
    "Revaluation (a warm feeling)",
    "What are the sections sections of? Imagine a caterpillar moving",
    "Imagine the piece as a set of disconnected events",
    "Is the intonation correct?",
    "Lowest common denominator",
    "Children -speaking -singing",
    "Intentions -nobility of -humility of -credibility of",
    "Balance the consistency principle with the inconsistency principle",
    "Cascades",
    "Change instrument roles",
    "Cluster analysis",
    "Consider different fading systems",
    "Consult other sources -promising -unpromising",
    "Emphasise repetitions",
    "Fill every beat with something",
    "Ghost echoes",
    "Go slowly all the way round the outside",
    "Infinitesimal gradations",
    "Into the impossible",
    "Mechanicalise something idiosyncratic",
    "Mute and continue",
    "(Organic) machinery",
    "The tape is now the music",
    "Think of the radio",
    "Use fewer notes",
    "What is the reality of the situation?",
    "You can only make one dot at a time",
    "Always give yourself credit for having more than personality\n(given by Arto Lindsay)",
    "Convert a melodic element into a rhythmic element",
    "Do the washing up",
    "Get your neck massaged",
    "Left channel, right channel, centre channel",
    "Put in earplugs",
    "Spectrum analysis",

    "Twist the spine",

    "Give the game away",

    "Only a part, not the whole",

    "Overtly resist change",

    "State the problem in words as clearly as possible",
    "Take a break",

    "The most important thing is the thing most easily forgotten",
    "Think - inside the work -outside the work",
    "Tidy up",
    "Towards the insignificant",
    "Try faking it!\n(given by Stewart Brand)",
    "Turn it upside down",
    "Use an old idea",
    "Use filters",
    "Use 'unqualified' people",
    "You don't have to be ashamed of using your own ideas",
    "Voice nagging suspicions",
    "Water",
    "Which frame would make this look right?",
    "What are you really thinking about just now? Incorporate",
    "What mistakes did you make last time?",
    "What to increase? What to reduce? ",
    "What to maintain?",
    "What were you really thinking about just now?",
    "What wouldn't you do?",
    "What would your closest friend do?",
    "When is it for?",
    "Where is the edge? Where does the frame start?",
    "Which elements can be grouped?",
    "Work at a different speed",
    "Would anybody want it?",
    "Honor thy error as a hidden intention",
    ];

  </script>
</body>
</html>
